server {
      listen 80;
      server_name realmofeverdice.com www.realmofeverdice.com;
      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }
      location / {
          return 301 https://$host$request_uri;
      }
  }

  server {
      listen 443 ssl;
      server_name realmofeverdice.com www.realmofeverdice.com;

      ssl_certificate     /etc/letsencrypt/live/realmofeverdice.com/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/realmofeverdice.com/privkey.pem;

      proxy_buffers 16 64k;
      proxy_buffer_size 128k;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      send_timeout 300s;
      client_max_body_size 50M;

      location / {
          proxy_pass http://host.docker.internal:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_cache_bypass $http_upgrade;
      }
  }

  server {
      listen 80 default_server;
      server_name _;

      client_max_body_size 64M;

      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }

      location / {
          proxy_pass         http://app:5000;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 600s;
      }
  }

  server {
      listen 80;
      server_name ontology.davidkoepsell.com;
      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }
      location / {
          return 301 https://$host$request_uri;
      }
  }

  server {
      listen 443 ssl;
      server_name ontology.davidkoepsell.com;

      ssl_certificate     /etc/letsencrypt/live/ontology.davidkoepsell.com/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/ontology.davidkoepsell.com/privkey.pem;

      client_max_body_size 64M;

      location / {
          proxy_pass         http://app:5000;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 600s;
      }
  }
